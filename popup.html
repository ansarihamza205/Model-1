<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hamza Gym Popup Box</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #111, #444);
    }

    .open-btn{
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      background: orange;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .open-btn:hover{
      background: darkorange;
    }

    /* Popup Background */
    .popup{
      width: 100%;
      height: 100vh;
      background: rgba(0,0,0,0.6);
      position: fixed;
      top: 0;
      left: 0;
      display: none;
      justify-content: center;
      align-items: center;
    }

    /* Popup Box */
    .popup-content{
      width: 350px;
      background: white;
      padding: 30px;
      text-align: center;
      border-radius: 12px;
      position: relative;
      animation: popup 0.4s ease;
    }

    @keyframes popup{
      from{
        transform: scale(0.5);
        opacity: 0;
      }
      to{
        transform: scale(1);
        opacity: 1;
      }
    }

    .popup-content h2{
      color: #111;
      margin-bottom: 15px;
    }

    .popup-content p{
      color: #555;
      margin-bottom: 20px;
    }

    .close-btn{
      padding: 10px 20px;
      border: none;
      background: red;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .close-btn:hover{
      background: darkred;
    }
  </style>
</head>
<body>

  <!-- Open Popup Button -->
  <button class="open-btn" onclick="openPopup()">
   Welcome to Gym
    Join Hamza Gym
  </button>

  <!-- Popup Box -->
  <div class="popup" id="popupBox">
    <div class="popup-content">
      <h2>Welcome to Hamza Gym 💪</h2>
      <p>
        Get fit, stay healthy, and build your dream body with Hamza Gym.
      </p>

      <button class="close-btn" onclick="closePopup()">
        Close
      </button>
    </div>
  </div>

  <script>
    function openPopup(){
      document.getElementById("popupBox").style.display = "flex";
    }

    function closePopup(){
      document.getElementById("popupBox").style.display = "none";
    }
  </script>

</body>
</html>
