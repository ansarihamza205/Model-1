<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hamza Gym Payment</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#111;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .payment-box{
      background:white;
      width:400px;
      padding:30px;
      border-radius:15px;
      box-shadow:0 0 15px rgba(0,0,0,0.5);
    }

    .payment-box h1{
      text-align:center;
      margin-bottom:20px;
      color:#ff4500;
    }

    .payment-box p{
      text-align:center;
      margin-bottom:20px;
      color:#555;
    }

    .input-box{
      margin-bottom:15px;
    }

    .input-box label{
      display:block;
      margin-bottom:5px;
      font-weight:bold;
    }

    .input-box input,
    .input-box select{
      width:100%;
      padding:10px;
      border:1px solid #ccc;
      border-radius:5px;
      font-size:16px;
    }

    .pay-btn{
      width:100%;
      padding:12px;
      background:#ff4500;
      color:white;
      border:none;
      border-radius:5px;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    .pay-btn:hover{
      background:#e03e00;
    }

    .secure{
      text-align:center;
      margin-top:15px;
      color:green;
      font-size:14px;
    }
  </style>
</head>

<body>

  <div class="payment-box">
    <h1>Hamza Gym</h1>
    <p>Membership Payment</p>

    <form>
      
      <div class="input-box">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required>
      </div>

      <div class="input-box">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <div class="input-box">
        <label>Membership Plan</label>
        <select required>
          <option value="">Select Plan</option>
          <option>1 Month - ₹999</option>
          <option>3 Months - ₹2499</option>
          <option>6 Months - ₹4499</option>
          <option>1 Year - ₹7999</option>
        </select>
      </div>

      <div class="input-box">
        <label>Card Number</label>
        <input type="text" placeholder="1234 5678 9012 3456" required>
      </div>

      <div class="input-box">
        <label>Expiry Date</label>
        <input type="month" required>
      </div>

      <div class="input-box">
        <label>CVV</label>
        <input type="password" placeholder="123" required>
      </div>

      <button type="submit" class="pay-btn">Pay Now</button>

      <div class="secure">
        🔒 Secure Payment
      </div>

    </form>
  </div>

</body>
</html>
