<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hamza Gym Register</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: linear-gradient(to right, #111, #444);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .register-box{
      width: 400px;
      background: white;
      padding: 35px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
    }

    .register-box h1{
      text-align: center;
      margin-bottom: 10px;
      color: #111;
    }

    .register-box p{
      text-align: center;
      margin-bottom: 25px;
      color: gray;
    }

    .input-box{
      margin-bottom: 18px;
    }

    .input-box label{
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .input-box input,
    .input-box select{
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      font-size: 15px;
    }

    .input-box input:focus,
    .input-box select:focus{
      border-color: #ff6600;
    }

    .register-btn{
      width: 100%;
      padding: 12px;
      border: none;
      background: #ff6600;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .register-btn:hover{
      background: #e65c00;
    }

    .bottom-text{
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .bottom-text a{
      color: #ff6600;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="register-box">
    <h1>Hamza Gym</h1>
    <p>Create Your Account</p>

    <form>

      <div class="input-box">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your full name" required>
      </div>

      <div class="input-box">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <div class="input-box">
        <label>Phone Number</label>
        <input type="tel" placeholder="Enter your phone number" required>
      </div>

      <div class="input-box">
        <label>Gender</label>
        <select required>
          <option value="">Select Gender</option>
          <option>Male</option>
          <option>Female</option>
        </select>
      </div>

      <div class="input-box">
        <label>Password</label>
        <input type="password" placeholder="Create password" required>
      </div>

      <div class="input-box">
        <label>Confirm Password</label>
        <input type="password" placeholder="Confirm password" required>
      </div>

      <button type="submit" class="register-btn">Register</button>

    </form>

    <div class="bottom-text">
      Already have an account? <a href="login page.html">Login</a>
    </div>
  </div>

</body>
</html>
