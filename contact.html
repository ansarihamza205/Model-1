<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Hamza Gym</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #111;
      color: white;
    }

    .header {
      background-color: #000;
      text-align: center;
      padding: 40px 20px;
    }

    .header h1 {
      color: #ff6600;
      font-size: 45px;
      margin-bottom: 10px;
    }

    .header p {
      color: #ccc;
      font-size: 18px;
    }

    .contact-container {
      width: 90%;
      max-width: 700px;
      margin: 50px auto;
      background-color: #222;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(255, 102, 0, 0.5);
    }

    .contact-container h2 {
      text-align: center;
      color: #ff6600;
      margin-bottom: 25px;
    }

    .contact-info {
      margin-bottom: 30px;
      line-height: 2;
      font-size: 18px;
    }

    .contact-info span {
      color: #ff6600;
      font-weight: bold;
    }

    form input,
    form textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
    }

    form textarea {
      resize: none;
      height: 120px;
    }

    .btn {
      width: 100%;
      background-color: #ff6600;
      color: white;
      padding: 14px;
      border: none;
      border-radius: 6px;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn:hover {
      background-color: #ff8533;
    }

    footer {
      background-color: #000;
      text-align: center;
      padding: 15px;
      color: #aaa;
      font-size: 14px;
      margin-top: 40px;
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>Contact Hamza Gym</h1>
    <p>Get in touch with us for memberships and fitness guidance</p>
  </div>

  <div class="contact-container">

    <h2>Contact Information</h2>

    <div class="contact-info">
      <p><span>Gym Name:</span> Hamza Gym</p>
      <p><span>Phone:</span> +91 9974293954</p>
      <p><span>Email:</span> hamzagym@gmail.com</p>
      <p><span>Address:</span> Ahmedabad, Gujarat, India</p>
    </div>

    <h2>Send Message</h2>

    <form>
      <input type="text" placeholder="Enter Your Name" required>

      <input type="email" placeholder="Enter Your Email" required>

      <input type="tel" placeholder="Enter Your Phone Number" required>

      <textarea placeholder="Write Your Message" required></textarea>

      <button type="submit" class="btn">Send Message</button>
    </form>

  </div>

  <footer>
    © 2026 Hamza Gym | All Rights Reserved
  </footer>

</body>
</html>
