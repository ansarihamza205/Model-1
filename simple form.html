<html>
<body>

<h2>Student Form</h2>

<form>

  Name: 
  <input type="text" required>
  <br><br>

  Password: 
  <input type="password" required>
  <br><br>

  Contact No: 
  <input type="tel" required>
  <br><br>

  Enrollment No: 
  <input type="text" required>
  <br><br>

  College Name: 
  <input type="text" required>
  <br><br>

</form>

</html>
