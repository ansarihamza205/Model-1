<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hamza Gym Login</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #111, #444);
    }

    .login-box{
      width: 350px;
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
      text-align: center;
    }

    .login-box h1{
      margin-bottom: 10px;
      color: #111;
    }

    .login-box p{
      margin-bottom: 25px;
      color: gray;
    }

    .input-box{
      margin-bottom: 20px;
      text-align: left;
    }

    .input-box label{
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    .input-box input{
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      font-size: 15px;
    }

    .input-box input:focus{
      border-color: #ff6600;
    }

    .login-btn{
      width: 100%;
      padding: 12px;
      border: none;
      background: #ff6600;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .login-btn:hover{
      background: #e65c00;
    }

    .bottom-text{
      margin-top: 15px;
      font-size: 14px;
    }

    .bottom-text a{
      color: #ff6600;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h1>Hamza Gym</h1>
    <p>Member Login</p>

    <form>
      
      <div class="input-box">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <div class="input-box">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" required>
      </div>

      
 <a class="btn" href="header_footer.html">login</a>
    </form>

    <div class="bottom-text">
      Don't have an account? <a href="register.html">Register</a>
    </div>
  </div>

</body>
</html>
